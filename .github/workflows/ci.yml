name: POP3 Client Test

on: [push]

jobs:

  linux-full:
    name: Build & Full Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev
          gcc --version
          openssl version

      - name: Compile
        run: |
          gcc -Wall -Wextra -o client src/client.c -lssl -lcrypto
          ls -lh client

      - name: Test — Full workflow (list, download #235, parse attachments)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          if [ -z "$GMAIL_USER" ] || [ -z "$GMAIL_PASS" ]; then
            echo "ERROR: GitHub Secrets not configured"
            echo "Set GMAIL_USER and GMAIL_PASS in repository Settings > Secrets"
            exit 1
          fi

          cat > test_script.txt << 'EOF'
          l
          d
          235
          q
          EOF

          echo "Running: List messages + Download #235"
          timeout 90 ./client "$GMAIL_USER" "$GMAIL_PASS" < test_script.txt 2>&1 | tee full_test.log

          echo ""
          echo "Verifying results..."

          passed=0
          failed=0

          if grep -q "ID.*Size" full_test.log; then
            echo "[PASS] Message list retrieved"
            ((passed++))
          else
            echo "[FAIL] Message list not found"
            ((failed++))
          fi

          if grep -q "Message #235" full_test.log; then
            echo "[PASS] Message #235 downloaded"
            ((passed++))
          else
            echo "[FAIL] Message #235 not found"
            ((failed++))
          fi

          if grep -q "From" full_test.log && grep -q "Subject" full_test.log; then
            echo "[PASS] Message headers parsed"
            ((passed++))
          else
            echo "[FAIL] Headers not parsed"
            ((failed++))
          fi

          if grep -q "Attachment" full_test.log; then
            echo "[PASS] Attachments detected"
            ((passed++))
          else
            echo "[FAIL] No attachments found"
            ((failed++))
          fi

          if grep -q "Decoding Base64" full_test.log; then
            echo "[PASS] Base64 decoding performed"
            ((passed++))
          else
            echo "[FAIL] Base64 decoding not found"
            ((failed++))
          fi

          if grep -q "\[OK\] Saved:" full_test.log; then
            echo "[PASS] Files saved to disk"
            ((passed++))
          else
            echo "[FAIL] Files not saved"
            ((failed++))
          fi

          echo ""
          echo "Test Results: $passed passed, $failed failed"

          if [ $failed -gt 0 ]; then
            exit 1
          fi

      - name: Show downloaded files
        if: always()
        run: |
          echo "Downloaded files:"
          ls -lh message_*.eml 2>/dev/null || echo "No .eml files"
          find . -maxdepth 1 -type f \( -name "*.pdf" -o -name "*.png" -o -name "*.jpg" -o -name "*.html" -o -name "*.txt" \) -exec ls -lh {} \;

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            full_test.log
            message_*.eml
            *.pdf
            *.png
            *.jpg
            *.html
            *.txt
          retention-days: 7